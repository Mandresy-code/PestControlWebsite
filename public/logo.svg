<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Arc principal : de 11h (en haut à gauche) dans le sens horaire jusqu'à 5h (en bas à droite) — 180° -->
  <path
    d="M 123 66 A 155 155 0 0 1 278 334"
    fill="none"
    stroke="#0E1F3D"
    stroke-width="9"
  />
  <!-- Arc secondaire : de 6h (bas) à 8h (bas gauche) — 60° -->
  <path
    d="M 200 355 A 155 155 0 0 1 66 278"
    fill="none"
    stroke="#0E1F3D"
    stroke-width="9"
  />
  <!-- Wordmark ESEIS -->
  <text
    x="200" y="222"
    text-anchor="middle"
    font-family="Geist, -apple-system, system-ui, sans-serif"
    font-weight="700"
    font-size="74"
    fill="#0E1F3D"
    letter-spacing="4"
  >ESEIS</text>
  <!-- Sous-titre PEST CONTROL -->
  <text
    x="200" y="256"
    text-anchor="middle"
    font-family="Geist, -apple-system, system-ui, sans-serif"
    font-weight="400"
    font-size="16"
